{% extends "base.html" %}
{% block content %}
<!-- Hero -->
<section class="relative h-screen overflow-hidden">

  <!-- Background image -->
  <div class="absolute inset-0 bg-cover bg-center"
       style="background-image: url('/static/img/home-bg.jpg');"></div>

  <!-- (Optional) purple tint like the reference -->
  <div class="absolute inset-0 bg-indigo-600/60 mix-blend-multiply"></div>

  <!-- Content -->
  <div class="relative z-10 h-full flex items-center">
    <div class="container mx-auto px-6 md:px-10">
      <h1 class="text-white font-extrabold leading-[0.95] tracking-tight
                 text-6xl md:text-7xl lg:text-8xl">
        Event<br class="hidden md:block"> Websites
      </h1>

      <a href="/dashboard"
         class="mt-10 inline-flex items-center justify-center
                rounded-full border-2 border-white px-8 py-3
                text-white text-lg font-semibold
                hover:bg-white hover:text-indigo-700 transition">
        Go to Dashboard
      </a>
    </div>
  </div>
</section>
{% endblock %}
